meta:
  name: irfel_turbo_weighted_fel
  machine: IRFEL
  description: IRFEL online TuRBO with weighted-sum scalar objective.

backend:
  type: epics
  bounds_mode: relative
  bounds:
    - [-8, 8]
    - [-8, 8]
    - [-8, 8]
    - [-8, 8]
  kwargs:
    knobs_pvnames:
      - IRFEL:PS:HC01:current:ao
      - IRFEL:PS:HC02:current:ao
      - IRFEL:PS:VC01:current:ao
      - IRFEL:PS:VC02:current:ao

    obj_pvnames:
      - FEL:Energy
      - IRFEL:BD:CT:CH4:WAV:ASUM

    obj_weights:
      - -1.0
      - -1.0

    obj_samples: 3

    obj_math:
      - mean
      - mean

    interval: 1.0

    log_path: template.opt
    readback_check: false
    readback_tol: 1.0e-6

    combine_mode: weighted_sum
    best_selector_mode: max

    objective_policy: fel_energy_guard
    objective_policy_kwargs:
      target_col: 0
      large_threshold: 1.0e6
      change_threshold: 1.0e-6

optimizer:
  name: turbo
  kwargs:
    n_init: 5
    n_iter: 15
    random_state: 120
    verbose: true
    # 如果你的 TuRBOOptimizer 支持这些参数，可取消注释后使用
    # batch_size: 1
    # success_tolerance: 3
    # failure_tolerance: 5
    # length_init: 0.8
    # length_min: 0.0078125
    # length_max: 1.6

runtime:
  save_history: true
  history_path: null
  plot_convergence: true
  plot_path: null
  set_best: true
  restore_initial_on_error: true
  restore_initial_on_keyboard_interrupt: true
  verbose: true