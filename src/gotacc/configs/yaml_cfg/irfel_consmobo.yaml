meta:
  name: irfel_mobo_vector_fel
  machine: IRFEL
  description: IRFEL online MOBO with vector objective.

backend:
  type: epics
  bounds_mode: relative
  bounds:
    - [-8, 8]
    - [-8, 8]
    - [-8, 8]
    - [-8, 8]
  kwargs:
    knobs_pvnames:
      - IRFEL:PS:HC01:current:ao
      - IRFEL:PS:HC02:current:ao
      - IRFEL:PS:VC01:current:ao
      - IRFEL:PS:VC02:current:ao

    obj_pvnames:
      - FEL:Energy
      - IRFEL:BD:CT:CH4:WAV:ASUM

    obj_weights:
      - -1.0
      - -1.0

    obj_samples: 3

    obj_math:
      - mean
      - mean
    constraint_pvnames:
      - PV:CONS0
    constraint_math:
      - mean  

    set_interval: 1.0
    sample_interval: 1.0

    log_path: template.opt
    readback_check: false
    readback_tol: 1.0e-6

    combine_mode: vector
    best_selector_mode: sum_min

    objective_policy: fel_energy_guard
    objective_policy_kwargs:
      target_col: 0
      large_threshold: 1.0e6
      change_threshold: 1.0e-6

optimizer:
  name: consmobo
  kwargs:
    n_objectives: 2
    n_init: 5
    n_iter: 10
    random_state: 0
    verbose: true
    device: cpu
    kernel_type: matern
    acq: qehvi
    ref_point:
      - 0.0
      - 0.0
    maximize: true
    acq_opt_kwargs:
      num_restarts: 8
      raw_samples: 256
      qehvi_batch: 1
    constraint_bounds:
      - [null, 100.0]

runtime:
  save_history: true
  history_path: null
  plot_convergence: false
  plot_path: null
  set_best: false
  restore_initial_on_error: true
  restore_initial_on_keyboard_interrupt: true
  verbose: true
